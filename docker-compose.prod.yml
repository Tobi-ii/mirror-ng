services:
  # Override: don't expose backend directly (Caddy handles public traffic)
  backend:
    ports: []

  # Override: don't expose frontend nginx directly (Caddy handles public traffic)
  frontend:
    ports: []

  # Add Caddy reverse proxy with auto HTTPS (Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mirror-net
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
